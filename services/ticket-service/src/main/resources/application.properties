spring.application.name=ticket-service

server.port=${PORT:8083}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

api.security.token.secret=${JWT_SECRET:F@br1c10S@nch3s}
api.security.token.issuer=${JWT_ISSUER:API Event Master}

spring.datasource.url=jdbc:mysql://${DB_IP:localhost}:${DB_PORT:3306}/${DB_NAME:ingresso}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Sao_Paulo
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PWD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:ticket-service-group}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.fabriciosanches.shared.events

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

app.kafka.topic.evento-criado=${KAFKA_TOPIC_EVENTO_CRIADO:EVENTO_CRIADO}
app.kafka.topic.pedido-realizado=${KAFKA_TOPIC_PEDIDO_REALIZADO:PEDIDO_REALIZADO}
app.kafka.topic.pedido-confirmado=${KAFKA_TOPIC_PEDIDO_CONFIRMADO:PEDIDO_CONFIRMADO}
app.kafka.topic.pedido-cancelado=${KAFKA_TOPIC_PEDIDO_CANCELADO:PEDIDO_CANCELADO}

