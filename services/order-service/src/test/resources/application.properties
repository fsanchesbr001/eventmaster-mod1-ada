spring.datasource.url=jdbc:h2:mem:orderdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

api.security.token.secret=test-secret
api.security.token.issuer=API Event Master

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.flyway.enabled=false

endpoint.event-service=http://localhost:8082/event-service/eventos
endpoint.ticket-service=http://localhost:8083/ticket-service/ingressos

app.kafka.topic.pedido-realizado=PEDIDO_REALIZADO
app.messaging.pedido-realizado.enabled=false

