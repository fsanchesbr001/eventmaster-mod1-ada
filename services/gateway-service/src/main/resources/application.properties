spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization,Content-Type
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.configUrl=/swagger-config.json
springdoc.swagger-ui.urls[0].name=gateway-service
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=user-service via gateway
springdoc.swagger-ui.urls[1].url=/api/users/v3/api-docs
springdoc.swagger-ui.urls[2].name=event-service via gateway
springdoc.swagger-ui.urls[2].url=/api/events/v3/api-docs
springdoc.swagger-ui.urls[3].name=ticket-service via gateway
springdoc.swagger-ui.urls[3].url=/api/tickets/v3/api-docs
springdoc.swagger-ui.urls[4].name=order-service via gateway
springdoc.swagger-ui.urls[4].url=/api/orders/v3/api-docs
springdoc.swagger-ui.urlsPrimaryName=gateway-service

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

