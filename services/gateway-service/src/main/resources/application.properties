spring.application.name=gateway-service

server.port=${PORT:8081}

api.security.token.secret=${JWT_SECRET:F@br1c10S@nch3s}
api.security.token.issuer=${JWT_ISSUER:API Event Master}

spring.cloud.gateway.routes[0].id=user-service-openapi
spring.cloud.gateway.routes[0].uri=${USER_SERVICE_URL:http://localhost:8080}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/users/v3/api-docs/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/api/users/v3/api-docs/?(?<segment>.*), /v3/api-docs/$\{segment}

spring.cloud.gateway.routes[1].id=user-service-swagger-ui
spring.cloud.gateway.routes[1].uri=${USER_SERVICE_URL:http://localhost:8080}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/users/swagger-ui/**,/api/users/swagger-ui.html
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/api/users/(?<segment>swagger-ui/.*|swagger-ui.html), /$\{segment}

spring.cloud.gateway.routes[2].id=user-service-auth
spring.cloud.gateway.routes[2].uri=${USER_SERVICE_URL:http://localhost:8080}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/api/auth/?(?<segment>.*), /auth/$\{segment}

spring.cloud.gateway.routes[3].id=user-service-api
spring.cloud.gateway.routes[3].uri=${USER_SERVICE_URL:http://localhost:8080}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/api/users/?(?<segment>.*), /user-service/usuarios/$\{segment}

spring.cloud.gateway.routes[4].id=event-service-openapi
spring.cloud.gateway.routes[4].uri=${EVENT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/events/v3/api-docs/**
spring.cloud.gateway.routes[4].filters[0]=RewritePath=/api/events/v3/api-docs/?(?<segment>.*), /v3/api-docs/$\{segment}

spring.cloud.gateway.routes[5].id=event-service-swagger-ui
spring.cloud.gateway.routes[5].uri=${EVENT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/events/swagger-ui/**,/api/events/swagger-ui.html
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/api/events/(?<segment>swagger-ui/.*|swagger-ui.html), /$\{segment}

spring.cloud.gateway.routes[6].id=event-service-api
spring.cloud.gateway.routes[6].uri=${EVENT_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/events/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/api/events/?(?<segment>.*), /event-service/eventos/$\{segment}

spring.cloud.gateway.routes[7].id=ticket-service-openapi
spring.cloud.gateway.routes[7].uri=${TICKET_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/tickets/v3/api-docs/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/api/tickets/v3/api-docs/?(?<segment>.*), /v3/api-docs/$\{segment}

spring.cloud.gateway.routes[8].id=ticket-service-swagger-ui
spring.cloud.gateway.routes[8].uri=${TICKET_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/tickets/swagger-ui/**,/api/tickets/swagger-ui.html
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/api/tickets/(?<segment>swagger-ui/.*|swagger-ui.html), /$\{segment}

spring.cloud.gateway.routes[9].id=ticket-service-api
spring.cloud.gateway.routes[9].uri=${TICKET_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/tickets/**
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/api/tickets/?(?<segment>.*), /ticket-service/ingressos/$\{segment}

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOriginPatterns=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].exposedHeaders=Authorization,Content-Type
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowCredentials=true
spring.cloud.gateway.globalcors.add-to-simple-url-handler-mapping=true

management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.gateway.enabled=true

